/* ── CodeBlock — render preformatted command snippets with a copy
   button. Strips markdown code fences (``` ... ```) and unescapes
   ``\n`` so the NewsNow docker snippet renders as real lines.  */
function CodeBlock(props) {
  const raw = String(props.text || "");
  let cleaned = raw.replace(/\\n/g, "\n");
  cleaned = cleaned.replace(/^\s*>\s?/gm, "");
  cleaned = cleaned.replace(/```[a-zA-Z0-9_-]*\n?/g, "").replace(/```\s*$/g, "");
  cleaned = cleaned.trim();
  const onCopy = function () {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(cleaned);
      } else {
        const ta = document.createElement("textarea");
        ta.value = cleaned;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
      }
      window.oaToast({level: "success", message: _i18n.t("ask.copied")});
    } catch (_) {}
  };
  return (
    <div className="fp-codeblock">
      <pre>{cleaned}</pre>
      <button className="btn btn-sm fp-codeblock__copy" type="button" onClick={onCopy}>
        <Ico name="copy"/> Copy
      </button>
    </div>
  );
}

/* ── ScheduleDialog — modal form mirroring the host "新建任务" layout
   (see Image-3 spec) so users can create a fin-pulse scheduled task
   entirely in-plugin. Every submission goes through the fin-pulse
   /schedules route which delegates to the host Agent Scheduler, so the
   underlying rows still live alongside other host-managed schedules —
   we just skip the redirect hand-off. */
const SCHEDULE_TEMPLATES = {
  morning:  {mode: "daily_brief", session: "morning", cron: "0 8 * * *",   since_hours: 12, top_k: 20, name: "fin-pulse morning"},
  noon:     {mode: "daily_brief", session: "noon",    cron: "30 12 * * *", since_hours: 12, top_k: 15, name: "fin-pulse noon"},
  evening:  {mode: "daily_brief", session: "evening", cron: "0 19 * * *",  since_hours: 12, top_k: 20, name: "fin-pulse evening"},
  radar:    {mode: "hot_radar",                       cron: "*/15 * * * *", since_hours: 24, limit: 100, cooldown_s: 600, name: "fin-pulse radar"},
};

function ScheduleDialog(props) {
  const t = useT();
  const tpl = props.template || "morning";
  const preset = SCHEDULE_TEMPLATES[tpl] || SCHEDULE_TEMPLATES.morning;
  const channels = props.channels || [];
  const firstChannel = channels[0] || {};
  const tzDisplay = (function () {
    try { return Intl.DateTimeFormat().resolvedOptions().timeZone || ""; } catch (_) { return ""; }
  })();

  const [form, setForm] = useState({
    name: preset.name,
    cron: preset.cron,
    channel: firstChannel.channel_id || "",
    chat_id: firstChannel.chat_id || "",
    rules_text: tpl === "radar" ? (props.defaultRulesText || "+美联储") : "",
    enabled: true,
  });
  const [submitting, setSubmitting] = useState(false);

  const update = function (key, val) {
    setForm(function (prev) { return Object.assign({}, prev, {[key]: val}); });
  };

  const onChannelChange = function (e) {
    const cid = e.target.value;
    const pick = channels.find(function (c) { return c.channel_id === cid; }) || {};
    setForm(function (prev) {
      return Object.assign({}, prev, {channel: cid, chat_id: pick.chat_id || prev.chat_id});
    });
  };

  const onSubmit = async function () {
    if (submitting) return;
    if (!form.name.trim()) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.name")});
      return;
    }
    if (!form.cron.trim()) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.cron")});
      return;
    }
    if (!form.channel || !form.chat_id) {
      window.oaToast({level: "warning", message: t("settings.schedules.dialog.no_channel")});
      return;
    }
    setSubmitting(true);
    try {
      const body = {
        mode: preset.mode,
        name: form.name.trim(),
        cron: form.cron.trim(),
        channel: form.channel,
        chat_id: form.chat_id,
        enabled: !!form.enabled,
      };
      if (preset.mode === "daily_brief") {
        body.session = preset.session;
        body.since_hours = preset.since_hours;
        body.top_k = preset.top_k;
        body.lang = "zh";
      } else {
        body.rules_text = form.rules_text || "";
        body.since_hours = preset.since_hours;
        body.limit = preset.limit;
        body.cooldown_s = preset.cooldown_s;
      }
      const resp = await api("POST", "/schedules", body);
      if (resp && resp.ok) {
        window.oaToast({level: "success", message: "scheduled " + (resp.id || "")});
        props.onDone && props.onDone(true);
      } else {
        window.oaToast({level: "error", message: "failed: " + ((resp && resp.detail) || "")});
      }
    } finally { setSubmitting(false); }
  };

  const hasChannels = channels.length > 0;
  const titleLabel = t("settings.schedules.tpl." + tpl);
  const channelLabel = (function () {
    const pick = channels.find(function (c) { return c.channel_id === form.channel; });
    if (!pick) return "—";
    return formatChannelLabel(pick);
  })();
  const previewMsg = tfmt(
    t("settings.schedules.dialog.preview." + tpl),
    {cron: form.cron || preset.cron, channel: channelLabel}
  );
  const typeLabel = preset.mode === "daily_brief"
    ? t("settings.schedules.dialog.type.digest")
    : t("settings.schedules.dialog.type.radar");

  return (
    <div className="confirm-mask" onClick={function () { props.onDone && props.onDone(false); }}>
      <div className="confirm-dialog" style={{maxWidth: 560}} onClick={function (e) { e.stopPropagation(); }}>
        <div className="card-title" style={{marginBottom: 12}}>
          {tfmt(t("settings.schedules.dialog.title"), {template: titleLabel})}
        </div>
        <div style={{display: "flex", flexDirection: "column", gap: 12}}>
          <label style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.name")}</span>
            <input className="input" value={form.name} onChange={function (e) { update("name", e.target.value); }} placeholder={preset.name}/>
          </label>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <div style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.type")}</span>
              <div className="input" style={{background: "var(--bg-subtle, rgba(0,0,0,.03))", cursor: "not-allowed"}}>{typeLabel}</div>
            </div>
            <div style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.trigger")}</span>
              <div className="input" style={{background: "var(--bg-subtle, rgba(0,0,0,.03))", cursor: "not-allowed"}}>{t("settings.schedules.dialog.trigger.cron")}</div>
            </div>
          </div>
          <label style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.time")}</span>
            <input className="input" value={form.cron} onChange={function (e) { update("cron", e.target.value); }} placeholder={preset.cron}/>
            <span className="oa-hint" style={{fontSize: 11}}>
              <a href="https://crontab.guru" target="_blank" rel="noreferrer">crontab.guru</a> · {t("settings.schedules.dialog.cron.hint")} · TZ: {tzDisplay || "host"}
            </span>
          </label>
          {preset.mode === "hot_radar" && (
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.rules")}</span>
              <textarea className="input" rows={3} value={form.rules_text}
                        onChange={function (e) { update("rules_text", e.target.value); }}/>
            </label>
          )}
          <div style={{display: "flex", flexDirection: "column", gap: 4}}>
            <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.content")}</span>
            <div className="oa-hint" style={{fontSize: 12, padding: "8px 10px", background: "var(--bg-subtle, rgba(0,0,0,.03))", borderRadius: 6, color: "var(--text)"}}>
              {previewMsg}
            </div>
          </div>
          <div style={{display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10}}>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.channel")}</span>
              <select className="input" value={form.channel} onChange={onChannelChange} disabled={!hasChannels}>
                <option value="">{hasChannels ? "—" : t("settings.schedules.dialog.no_channel")}</option>
                {channels.map(function (c) {
                  return <option key={c.channel_id + ":" + (c.chat_id || "")} value={c.channel_id}>{formatChannelLabel(c)}</option>;
                })}
              </select>
            </label>
            <label style={{display: "flex", flexDirection: "column", gap: 4}}>
              <span style={{fontSize: 12, color: "var(--text)", fontWeight: 600}}>{t("settings.schedules.dialog.chat_id")}</span>
              <input className="input" value={form.chat_id} onChange={function (e) { update("chat_id", e.target.value); }}/>
            </label>
          </div>
          <label style={{display: "flex", alignItems: "center", gap: 8, userSelect: "none"}}>
            <input type="checkbox" checked={!!form.enabled}
                   onChange={function (e) { update("enabled", e.target.checked); }}/>
            <span style={{fontSize: 13, color: "var(--text)"}}>{t("settings.schedules.dialog.enabled")}</span>
          </label>
        </div>
        <div className="confirm-actions" style={{marginTop: 16}}>
          <button className="btn btn-sm" onClick={function () { props.onDone && props.onDone(false); }}>
            {t("settings.schedules.dialog.cancel")}
          </button>
          <button className="btn btn-sm btn-primary" disabled={submitting || !hasChannels} onClick={onSubmit}>
            {t("settings.schedules.dialog.create")}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Settings Form — sources, channels (with in-card no-channel banner
   + explicit refresh button), templated schedules (with full in-page
   run/pause/delete actions), NewsNow 3-stage wizard, LLM hint.
   We never redirect to the host SchedulerView — row actions talk to
   the host scheduler REST API directly via the plugin bridge. */

/* Public NewsNow upstream — hard-coded so users never need to hunt for
   the URL. Keeps the pipeline's 5-minute floor paired with a stable
   node reference. Change both here and finpulse_task_manager._seed_default_config
   if upstream ever moves. */
const NEWSNOW_PUBLIC_URL = "https://newsnow.busiyi.world/api/s";
const NEWSNOW_PUBLIC_MIN_INTERVAL_S = 300;

function SettingsForm(props) {
  const t = useT();
  const [config, setConfig] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [channels, setChannels] = useState([]);
  const [schedules, setSchedules] = useState([]);
  const [probeMsg, setProbeMsg] = useState("");
  const [savingKey, setSavingKey] = useState("");
  const [scheduleDialog, setScheduleDialog] = useState(null);
  const [channelsRefreshing, setChannelsRefreshing] = useState(false);
  const [rowPending, setRowPending] = useState({});

  const reloadAll = useCallback(async function (opts) {
    const silent = !!(opts && opts.silent);
    const [cfg, ch, sched] = await Promise.all([
      api("GET", "/config"),
      api("GET", "/scheduler/channels"),
      api("GET", "/schedules"),
    ]);
    setConfig((cfg && cfg.config) || {});
    let list = (ch && Array.isArray(ch.channels)) ? ch.channels : [];
    if (!list.length) {
      const fb = await api("GET", "/available-channels");
      const names = (fb && fb.channels) || [];
      list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
    }
    setChannels(list);
    setSchedules((sched && sched.items) || []);
    setLoaded(true);
    if (!silent) return;
  }, []);
  useEffect(function () { reloadAll(); }, [reloadAll]);

  const reloadSchedules = useCallback(async function () {
    const sched = await api("GET", "/schedules");
    setSchedules((sched && sched.items) || []);
  }, []);

  const onRefreshChannels = useCallback(async function () {
    setChannelsRefreshing(true);
    try {
      const ch = await api("GET", "/scheduler/channels");
      let list = (ch && Array.isArray(ch.channels)) ? ch.channels : [];
      if (!list.length) {
        const fb = await api("GET", "/available-channels");
        const names = (fb && fb.channels) || [];
        list = names.map(function (n) { return { channel_id: String(n), chat_id: "" }; });
      }
      setChannels(list);
      window.oaToast({level: "success", message: t("settings.channels.refreshed")});
    } finally { setChannelsRefreshing(false); }
  }, [t]);

  const setCfgField = function (key, value) {
    setConfig(function (prev) { return Object.assign({}, prev, {[key]: value}); });
  };
  const persist = useCallback(async function (updates) {
    const resp = await api("PUT", "/config", {updates: updates});
    if (resp && resp.ok) {
      window.oaToast({level: "success", message: t("settings.saved")});
    } else {
      window.oaToast({level: "error", message: "save failed"});
    }
  }, [t]);

  const onProbeNewsNow = useCallback(async function () {
    setProbeMsg("…");
    const resp = await api("POST", "/ingest/source/newsnow");
    // Rate-limited case surfaces a structured summary rather than detail.
    const rl = resp && resp.summary && resp.summary.by_source &&
               resp.summary.by_source.newsnow &&
               resp.summary.by_source.newsnow.error_kind === "rate_limited"
      ? resp.summary.by_source.newsnow.retry_after_s : null;
    if (rl != null) {
      setProbeMsg(tfmt(t("settings.newsnow.rate_limited"), {s: rl}));
      return;
    }
    if (resp && resp.ok) {
      const n = (resp.summary && resp.summary.inserted) || (resp.summary && resp.summary.received) || 0;
      setProbeMsg(tfmt(t("settings.newsnow.probe.ok"), {n: n}));
    } else {
      setProbeMsg(tfmt(t("settings.newsnow.probe.fail"), {err: (resp && resp.detail) || "unknown"}));
    }
  }, [t]);

  const onSendTest = useCallback(async function (ch) {
    const channel = (ch && ch.channel_id) || "";
    const defaultChatId = (ch && ch.chat_id) || "";
    const chat_id = window.prompt("chat_id for " + channel, defaultChatId);
    if (!chat_id) return;
    const resp = await api("POST", "/dispatch/send", {
      channel: channel, chat_id: chat_id,
      content: "[fin-pulse] channel test — " + new Date().toISOString(),
      cooldown_s: 0,
    });
    window.oaToast({
      level: resp && resp.ok ? "success" : "error",
      message: resp && resp.ok ? "sent" : "failed: " + (resp && resp.dispatch && resp.dispatch.error || ""),
    });
  }, []);

  /* Row-level schedule actions: we call the host scheduler REST API
     directly through the plugin bridge for toggle / trigger (those
     endpoints are plugin-specific wrappers that enforce fin-pulse
     ownership), and the plugin's own /schedules/{id} for delete. */
  const markRow = function (id, key, val) {
    setRowPending(function (prev) {
      const copy = Object.assign({}, prev);
      copy[id] = Object.assign({}, prev[id] || {}, {[key]: val});
      return copy;
    });
  };
  const onTriggerRow = useCallback(async function (s) {
    markRow(s.id, "run", true);
    try {
      const resp = await api("POST", "/schedules/" + s.id + "/trigger");
      window.oaToast({
        level: resp && resp.ok ? "success" : "error",
        message: resp && resp.ok ? t("settings.schedules.row.triggered") : "failed",
      });
    } finally { markRow(s.id, "run", false); }
  }, [t]);
  const onToggleRow = useCallback(async function (s) {
    markRow(s.id, "toggle", true);
    try {
      const resp = await api("POST", "/schedules/" + s.id + "/toggle");
      if (resp && resp.ok) await reloadSchedules();
      else window.oaToast({level: "error", message: "toggle failed"});
    } finally { markRow(s.id, "toggle", false); }
  }, [reloadSchedules]);
  const onDeleteRow = useCallback(async function (s) {
    if (!window.confirm(t("settings.schedules.row.confirm_delete"))) return;
    markRow(s.id, "del", true);
    try {
      const resp = await api("DELETE", "/schedules/" + s.id);
      if (resp && resp.ok) {
        window.oaToast({level: "success", message: t("settings.schedules.row.deleted")});
        await reloadSchedules();
      } else {
        window.oaToast({level: "error", message: "delete failed"});
      }
    } finally { markRow(s.id, "del", false); }
  }, [reloadSchedules, t]);

  if (!loaded) return <div className="card"><div className="empty">{t("today.list.loading")}</div></div>;

  /* NewsNow defaults: first-render should treat ``undefined`` / ``off``
     as "use the public aggregator with the built-in URL". We only show
     the input box in self_host mode to avoid confusing copy-paste. */
  const rawNewsnowMode = config["newsnow.mode"];
  const newsnowMode = (rawNewsnowMode && String(rawNewsnowMode)) || "public";
  const rawNewsnowUrl = config["newsnow.api_url"];
  const newsnowUrl = (rawNewsnowUrl && String(rawNewsnowUrl))
    || (newsnowMode === "public" ? NEWSNOW_PUBLIC_URL : "");
  const rawMinInterval = parseInt(config["newsnow.min_interval_s"] || "300", 10);
  const newsnowFloor = (isNaN(rawMinInterval) ? 300 : Math.max(
    newsnowMode === "public" ? NEWSNOW_PUBLIC_MIN_INTERVAL_S : 0,
    rawMinInterval
  ));
  const radarRules = String(config["radar_rules"] || "+美联储 +降息");
  const hasAnyChannel = channels.length > 0;

  return (
    <div>
      <div className="card">
        <div className="card-title">{t("settings.sources.title")}</div>
        <div style={{display: "flex", flexWrap: "wrap", gap: 8}}>
          {KNOWN_SOURCES.map(function (s) {
            const state = String(config["source." + s.id + ".last_error"] || "");
            const ok = !state;
            return (
              <span key={s.id}
                    className={"api-pill " + (ok ? "" : "api-pill--missing")}
                    title={state || "last_ok"}>
                {s.name}
              </span>
            );
          })}
        </div>
      </div>

      <div className="card">
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8}}>
          <div className="card-title" style={{margin: 0}}>{t("settings.channels.title")}</div>
          <button className="btn btn-sm" type="button"
                  disabled={channelsRefreshing}
                  onClick={onRefreshChannels}>
            <Ico name="refresh"/> {t("settings.channels.refresh")}
          </button>
        </div>
        {!hasAnyChannel ? (
          <div className="oa-config-banner" role="alert">
            <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
            <div className="oa-config-banner__text">
              <strong>{t("banner.noChannel.title")}</strong>
              <div style={{fontSize: 12, color: "var(--text)", marginTop: 2}}>
                {t("banner.noChannel.desc")}
              </div>
            </div>
          </div>
        ) : (
          <div style={{display: "flex", flexWrap: "wrap", gap: 8}}>
            {channels.map(function (ch, idx) {
              const key = (ch.channel_id || "") + ":" + (ch.chat_id || idx);
              return (
                <div key={key} style={{display: "flex", alignItems: "center", gap: 6}}>
                  <span className="api-pill">{formatChannelLabel(ch)}</span>
                  <button className="btn btn-sm" onClick={function () { onSendTest(ch); }}>
                    <Ico name="send"/> {t("settings.channels.send")}
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-title" style={{marginBottom: 6}}>{t("settings.schedules.title")}</div>
        <div className="oa-hint" style={{marginBottom: 10}}>{t("settings.schedules.desc")}</div>
        <div style={{display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 8, marginBottom: 14}}>
          {["morning", "noon", "evening", "radar"].map(function (tpl) {
            return (
              <button key={tpl}
                      className="btn"
                      type="button"
                      style={{display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 4, padding: "10px 12px", textAlign: "left"}}
                      onClick={function () { setScheduleDialog(tpl); }}>
                <span style={{fontWeight: 600}}>
                  <Ico name={tpl === "radar" ? "target" : "bell"}/> {t("settings.schedules.tpl." + tpl)}
                </span>
                <span className="oa-hint" style={{fontSize: 11}}>{t("settings.schedules.tpl." + tpl + ".desc")}</span>
              </button>
            );
          })}
        </div>
        {schedules.length === 0 ? (
          <div className="empty">{t("settings.schedules.none")}</div>
        ) : (
          <div>
            {schedules.map(function (s) {
              const pending = rowPending[s.id] || {};
              const enabled = s.enabled !== false;
              return (
                <div key={s.id}
                     style={{display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: "1px solid var(--border)", flexWrap: "wrap"}}>
                  <span className="api-pill">{s.name || s.id}</span>
                  <span style={{fontSize: 11, color: "var(--text-muted)"}}>{s.cron || s.cron_expression || ""}</span>
                  <span className={"api-pill " + (enabled ? "" : "api-pill--missing")} style={{fontSize: 11}}>
                    {enabled ? t("settings.schedules.row.enabled") : t("settings.schedules.row.disabled")}
                  </span>
                  <span style={{flex: 1, minWidth: 8}}/>
                  <span style={{fontSize: 11, color: "var(--text-muted)"}}>
                    {s.channel || s.channel_id || ""}{s.chat_id ? " · " + s.chat_id : ""}
                  </span>
                  <button className="btn btn-sm"
                          disabled={!!pending.run}
                          onClick={function () { onTriggerRow(s); }}>
                    <Ico name="play"/> {t("settings.schedules.row.run")}
                  </button>
                  <button className="btn btn-sm"
                          disabled={!!pending.toggle}
                          onClick={function () { onToggleRow(s); }}>
                    <Ico name={enabled ? "pause" : "play"}/>{" "}
                    {enabled ? t("settings.schedules.row.pause") : t("settings.schedules.row.resume")}
                  </button>
                  <button className="btn btn-sm"
                          disabled={!!pending.del}
                          onClick={function () { onDeleteRow(s); }}>
                    <Ico name="trash"/> {t("settings.schedules.row.delete")}
                  </button>
                </div>
              );
            })}
          </div>
        )}
        {scheduleDialog ? (
          <ScheduleDialog
            template={scheduleDialog}
            channels={channels}
            defaultRulesText={radarRules}
            onDone={function (ok) {
              setScheduleDialog(null);
              if (ok) reloadAll();
            }}/>
        ) : null}
      </div>

      <div className="card">
        <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10}}>
          <div className="card-title" style={{margin: 0}}>{t("settings.newsnow.title")}</div>
          {newsnowMode !== "off" && (
            <div style={{display: "flex", gap: 8, alignItems: "center"}}>
              <button className="btn btn-sm btn-primary"
                      disabled={savingKey !== ""}
                      onClick={async function () {
                        setSavingKey("newsnow");
                        try {
                          const updates = {
                            "newsnow.mode": newsnowMode,
                            "newsnow.api_url": newsnowUrl,
                            "newsnow.min_interval_s": String(newsnowFloor),
                          };
                          await persist(updates);
                          await onProbeNewsNow();
                        } finally { setSavingKey(""); }
                      }}>
                <Ico name="play"/> {t("settings.newsnow.probe")}
              </button>
            </div>
          )}
        </div>
        <div style={{marginBottom: 10}}>
          <div className="label">{t("settings.newsnow.step1")}</div>
          <div style={{display: "flex", gap: 6}}>
            {["off", "public", "self_host"].map(function (m) {
              const active = newsnowMode === m;
              return <span key={m}
                           className={"api-pill " + (active ? "" : "api-pill--missing")}
                           onClick={function () {
                             setCfgField("newsnow.mode", m);
                             // Snap URL/floor back to built-in values when
                             // switching into public mode so users don't have
                             // to hit any extra save step.
                             if (m === "public") {
                               setCfgField("newsnow.api_url", NEWSNOW_PUBLIC_URL);
                               const cur = parseInt(config["newsnow.min_interval_s"] || "300", 10);
                               if (isNaN(cur) || cur < NEWSNOW_PUBLIC_MIN_INTERVAL_S) {
                                 setCfgField("newsnow.min_interval_s", String(NEWSNOW_PUBLIC_MIN_INTERVAL_S));
                               }
                             }
                           }}>
                {t("settings.newsnow.mode." + m)}
              </span>;
            })}
          </div>
          {newsnowMode === "public" && (
            <div className="oa-config-banner" role="alert" style={{marginTop: 10, background: "rgba(245,158,11,.12)", border: "1px solid rgba(245,158,11,.24)"}}>
              <span className="oa-icon oa-config-banner__icon"><Ico name="warn"/></span>
              <div className="oa-config-banner__text" style={{fontSize: 12}}>
                {tfmt(t("settings.newsnow.warn.public"), {floor: newsnowFloor})}
              </div>
            </div>
          )}
        </div>

        {newsnowMode === "public" && (
          <div style={{marginBottom: 10}}>
            <div className="label">{t("settings.newsnow.step2")}</div>
            <div className="oa-hint" style={{fontSize: 12, padding: "8px 10px", background: "var(--bg-subtle, rgba(0,0,0,.03))", borderRadius: 6, color: "var(--text)"}}>
              {tfmt(t("settings.newsnow.url.readonly"), {url: NEWSNOW_PUBLIC_URL})}
            </div>
            <div className="label" style={{marginTop: 10}}>{t("settings.newsnow.floor.label")}</div>
            <div className="field-wrap">
              <input className="input"
                     type="number"
                     min={NEWSNOW_PUBLIC_MIN_INTERVAL_S}
                     step={60}
                     value={newsnowFloor}
                     onChange={function (e) {
                       const v = Math.max(NEWSNOW_PUBLIC_MIN_INTERVAL_S, parseInt(e.target.value || "300", 10) || NEWSNOW_PUBLIC_MIN_INTERVAL_S);
                       setCfgField("newsnow.min_interval_s", String(v));
                     }}/>
            </div>
          </div>
        )}

        {newsnowMode === "self_host" && (
          <div style={{marginBottom: 10}}>
            <div className="label">{t("settings.newsnow.step2")}</div>
            <div className="field-wrap">
              <input className="input"
                     type="text"
                     placeholder="http://127.0.0.1:4444/api/s"
                     value={newsnowUrl}
                     onChange={function (e) { setCfgField("newsnow.api_url", e.target.value); }}/>
            </div>
            <div style={{marginTop: 8}}>
              <CodeBlock text={t("settings.newsnow.help.self_host")} />
            </div>
          </div>
        )}

        {probeMsg ? (
          <div className="oa-hint" style={{fontSize: 12}}>{probeMsg}</div>
        ) : null}
      </div>

      <div className="card">
        <div className="card-title">{t("settings.llm.title")}</div>
        <div className="oa-hint">{t("settings.llm.hint")}</div>
      </div>
    </div>
  );
}

/* ── App shell ── */
function App() {
  const t = useT();
  const [activeTab, setActiveTab] = useState(0);
  const { settings, loaded } = useSettings();

  /* theme sync from host ctx */
  useEffect(function () {
    return onEvent("openakita:theme-change", function (d) {
      const theme = (d && d.theme) || "light";
      document.documentElement.setAttribute("data-theme", theme.indexOf("dark") >= 0 ? "dark" : "light");
    });
  }, []);

  /* shortcut keys (d → theme toggle, Esc → close modal) */
  useEffect(function () {
    function onKey(e) {
      const tag = (e.target && e.target.tagName) || "";
      if (tag === "INPUT" || tag === "TEXTAREA" || e.target.isContentEditable) return;
      if (e.key === "d") {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("fp-theme", next); } catch (_) {}
      }
    }
    window.addEventListener("keydown", onKey);
    return function () { window.removeEventListener("keydown", onKey); };
  }, []);

  /* The "no IM channel" banner was previously mounted globally on
     every tab. We now scope it strictly to the Settings → IM channels
     card (rendered inside SettingsForm), so the Today / Digests /
     Radar / Ask tabs stay visually clean. */

  return (
    <div className="app">
      <div className="header">
        <h1 className="oa-hero-title">
          <BrandMark />
          <span className="oa-hero-title__text">
            {t("app.title")}
            <span className="oa-hero-title__sub">{t("app.subtitle")}</span>
          </span>
        </h1>
        <div className="header-right" />
      </div>
      <div className="tabs">
        {TAB_IDS.map(function (id, i) {
          return (
            <div key={id}
                 className={"tab " + (activeTab === i ? "active" : "")}
                 onClick={function () { setActiveTab(i); }}>
              <Ico name={TAB_ICONS[id]} /> {t("tabs." + id)}
            </div>
          );
        })}
      </div>
      <div className="content">
        {activeTab === 0 && <TodayTab />}
        {activeTab === 1 && <DigestsTab />}
        {activeTab === 2 && <RadarTab />}
        {activeTab === 3 && <AskTab />}
        {activeTab === 4 && <SettingsTab goToTab={setActiveTab} />}
      </div>
      <ConfirmHost />
    </div>
  );
}

class PluginErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error: error }; }
  componentDidCatch(error, info) { this.setState({ info: info }); console.error("[fin-pulse] render error:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    const err = this.state.error;
    const msg = (err && err.message) ? err.message : String(err);
    return (
      <div style={{padding: 24, maxWidth: 820, margin: "0 auto"}}>
        <div className="err-panel">
          <div className="err-panel__title"><Ico name="warn" /> {_i18n.t("err.title")}</div>
          <div className="err-panel__msg">{msg}</div>
          <button className="btn btn-sm" onClick={() => this.setState({ error: null, info: null })}>
            {_i18n.t("err.retry")}
          </button>
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PluginErrorBoundary><App /></PluginErrorBoundary>
);
if (window.OpenAkita && typeof window.OpenAkita.ready === "function") {
  window.OpenAkita.ready();
}
  </script>
</body>
